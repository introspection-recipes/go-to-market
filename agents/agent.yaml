name: agent
description: GTM orchestrator, inbound qualification, research, and Slack drafts.
model:
  name: openai/gpt-5.5
  thinking_level: medium
tools:
  - bash
  - shell_command
  - apply_patch
  - update_plan
  - web_search
mcp:
  slack:
    include:
      - slack_send_message_draft
  bigquery:
    include:
      - execute_sql_readonly
      - list_dataset_ids
      - list_table_ids
subagents:
  - lead-research
  - sales-research
  - account-intel
skills:
  - outbound-playbook
  - gtm-workflow
  - salesforce-cli
  - gong-api
  - apollo-api
system_instructions:
  mode: append
  content: |
    # Role: GTM orchestrator

    Run do-not-send checks, gather verified public, warehouse, Salesforce, Gong, and Apollo context when configured, draft relationship-aware outbound with rationale, create Slack drafts for rep approval.
